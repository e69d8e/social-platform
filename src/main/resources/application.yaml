spring:
  application:
    name=: SocialPlatform
  # 数据库连接
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/social_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
#      host: 172.20.165.155
      port: 6379
      password: ${PASSWORD}
      timeout: 3000 # 超时时间
      lettuce:
        pool:
          max-active: 10 # 最大连接数
          max-idle: 10 # 最大空闲连接数
          min-idle: 1 # 最小空闲连接数
          time-between-eviction-runs: 10s # 逐出连接的最小空闲时间
      database: 1
    mongodb:
      uri: mongodb://127.0.0.1:27017/chat_memory_db
  elasticsearch:
    uris: http://127.0.0.1:9200
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB  # 文件上传最大限制
      max-request-size: 10MB # 请求上传最大限制
server:
#  servlet:
#    context-path: /api
  port: 8081

logging:
  level:
    root: info
  file:
    path: logs
langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen-plus
        api-key: ${DASH_SCOPE_API_KEY}
      streaming-chat-model:
        model-name: qwen-plus
        api-key: ${DASH_SCOPE_API_KEY}


social-platform:
  system-constants:
    user-nickname-prefix: "u_"
    image-upload-dir: "${IMAGE_PATH:}"
    base-url: "http://127.0.0.1:8080/imgs"
    default-page-size: 12
    max-page-size: 1
    default-avatar: "http://127.0.0.1:8080/imgs/avatar/default.jpg"
    title-max-length: 100
    content-max-length: 12000
    nickname-max-length: 16
    bio-max-length: 2000

jwt:
  secret: ${PASSWORD}
  access-expire: 86400000 # 毫秒值 1天
#  access-expire: 10000 # 毫秒
  refresh-expire: 604800000 # 7天

cors:
  allowed-origin: ${CORS_ORIGIN:http://127.0.0.1:5173}